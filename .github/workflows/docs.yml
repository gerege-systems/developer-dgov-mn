# Government Developer Portal V3.0
# Docs — MkDocs (Material + i18n mn/en) сайтыг GitHub Pages дээр байршуулна.
# main дээрх docs-site/ өөрчлөгдөх бүрт (эсвэл гараар) build хийж deploy хийнэ.
# URL: https://gerege-systems.github.io/developer-dgov-mn/
name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs-site/requirements.txt
      - name: Install MkDocs + plugins
        run: pip install -r requirements.txt
      - name: Build (strict)
        run: mkdocs build --clean --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
